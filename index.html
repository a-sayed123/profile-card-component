<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Profile card component</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/media.css" />
  </head>
  <body>
    <main class="main">
      <article>
        </div>
        <div class="card">
          <div class="card-header">
            <img
              src="./images/bg-pattern-card.svg"
              alt="Card img"
              class="card-img"
            />
          </div>
          <div class="card-content">
            <div class="profile img">
              <img src="./images/image-victor.jpg" alt="Profile img" />
            </div>
            <h1 class="card-title">Victor Crest</h1>
            <span class="span">26</span>
            <p class="card-subtitle">London</p>
          </div>
          <div class="card-footer">
            <ul class="flex-list">
              <li class="flex-item">
                <p class="info-amount">80K</p>
                <span class="info-type">Followers</span>
              </li>
              <li class="flex-item">
                <p class="info-amount">803K</p>
                <span class="info-type">Likes</span>
              </li>
              <li class="flex-item">
                <p class="info-amount">1.4K</p>
                <span class="info-type">Photos</span>
              </li>
            </ul>
          </div>
        </div>
      </article>
    </main>
    <!-- <div class="attribution">

      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div> -->
  </body>
</html>
